# Development Docker Compose configuration
#
# Usage (via justfile):
#   just build    # Build images
#   just up       # Start services
#   just down     # Stop services
#
# Or directly:
#   docker compose -f dev/docker-compose.dev.yml --project-directory . up -d
#
# This configuration:
# - Mounts source code for live reloading
# - Uses debug builds for Rust
# - Exposes all ports for local development
# - Uses trust auth for PostgreSQL (no password)
# - Uses development TLS certificates from dev/
---
services:
  ta:
    restart: always
    build: .
    image: docker.sunet.se/inmor:0.3.0
    networks:
      - inmor-net
    healthcheck:
      test: ['CMD', 'curl', '--insecure', '--fail', '--silent', 'https://localhost:8080/health']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./target/debug/inmor:/app/inmor
      - ./taconfig.toml:/app/taconfig.toml
      - ./private.json:/app/private.json
      - ./publickeys:/app/publickeys
      - ./historical_keys:/app/historical_keys
      - ./templates:/app/templates
      - ./dev/localhost+2.pem:/app/localhost+2.pem
      - ./dev/localhost+2-key.pem:/app/localhost+2-key.pem
    depends_on:
      redis:
        condition: service_healthy
    command: ./inmor -c taconfig.toml
    environment:
      - 'RUST_LOG=debug'
    ports:
      - "8080:8080"
  db:
    restart: always
    image: postgres:14-alpine
    shm_size: 1024mb
    networks:
      - inmor-net
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - 'POSTGRES_HOST_AUTH_METHOD=trust'
  redis:
    restart: always
    image: redis:7-alpine
    networks:
      - inmor-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    volumes:
      - ./redis:/data
  admin:
    build: ./admin/
    image: docker.sunet.se/inmor-admin:0.3.0
    networks:
      - inmor-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ta:
        condition: service_healthy
    command: /app/docker-entrypoint.sh
    environment:
      - INSIDE_CONTAINER=true
      # MFA encryption key for TOTP secrets - generate a new key for production with:
      # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # - MFA_ENCRYPTION_KEY=your-production-key-here
    volumes:
      - ./private.json:/app/private.json
      - ./admin/inmoradmin:/app/inmoradmin
      - ./admin/apikeys:/app/apikeys
      - ./admin/auditlog:/app/auditlog
      - ./admin/entities:/app/entities
      - ./admin/trustmarks:/app/trustmarks
      - ./admin/templates:/app/templates
      - ./admin/common:/app/common
      - ./admin/tests:/app/tests
      - ./publickeys:/app/publickeys
      - ./historical_keys:/app/historical_keys
    # - ./localsettings.py:/app/inmoradmin/localsettings.py
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./admin/frontend/
      target: production
      args:
        VITE_API_URL: ""
    image: docker.sunet.se/inmor-frontend:0.3.0
    networks:
      - inmor-net
    depends_on:
      - admin
    ports:
      - "127.0.0.1:5173:80"
networks:
  inmor-net:
    driver: bridge
